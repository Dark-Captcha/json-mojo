name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            envs: "default dev"
            full_checks: true
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            envs: "default"
            full_checks: false
          - name: macOS Apple Silicon
            runner: macos-26
            envs: "default"
            full_checks: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.72.0
          environments: ${{ matrix.envs }}
          locked: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Show toolchain
        run: |
          pixi --version
          pixi run mojo --version

      - name: Format
        if: matrix.full_checks
        run: |
          pixi run format
          git diff --exit-code

      - name: Test
        run: pixi run test

      - name: Fetch verification corpora
        if: matrix.full_checks
        run: |
          git clone --depth 1 https://github.com/nst/JSONTestSuite references/JSONTestSuite
          git clone --depth 1 https://github.com/json5/json5-tests references/json5-tests

      - name: Verify
        if: matrix.full_checks
        run: pixi run verify

      - name: Example
        run: pixi run example

      - name: Benchmark smoke
        if: matrix.full_checks
        run: pixi run benchmark
