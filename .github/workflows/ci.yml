name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            envs: "default dev"
            full_checks: true
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            envs: "default"
            full_checks: false
          - name: macOS Apple Silicon
            runner: macos-26
            envs: "default"
            full_checks: false

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
        with:
          pixi-version: v0.72.0
          environments: ${{ matrix.envs }}
          locked: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Show toolchain
        run: |
          pixi --version
          pixi run mojo --version

      - name: Format
        if: matrix.full_checks
        run: |
          pixi run format
          git diff --exit-code

      - name: Validate public documentation
        if: matrix.full_checks
        run: pixi run doc

      - name: Test
        run: pixi run test

      - name: Fetch JSONTestSuite
        if: matrix.full_checks
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: nst/JSONTestSuite
          ref: 1ef36fa01286573e846ac449e8683f8833c5b26a
          path: references/JSONTestSuite
          persist-credentials: false

      - name: Fetch json5-tests
        if: matrix.full_checks
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: json5/json5-tests
          ref: ceb24d4080137d70833f86c25659c1331b80a387
          path: references/json5-tests
          persist-credentials: false

      - name: Fetch EmberJson
        if: matrix.full_checks
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: bgreni/EmberJson
          ref: 0d890bddae4ffd40cdab3f9f1b27f5feaa55dba7
          path: references/EmberJson
          persist-credentials: false

      - name: Verify
        if: matrix.full_checks
        run: pixi run verify

      - name: Example
        run: pixi run example

      - name: Benchmark smoke
        if: matrix.full_checks
        run: pixi run benchmark
