context:
  version: "1.6.0"
  mojo_version: "=1.0.0b3.dev2026070506"

package:
  name: json-mojo
  version: ${{ version }}

source:
  - git: https://github.com/Dark-Captcha/json-mojo.git
    rev: b3b7feb1654555d03481466edc3df85eb58a7a62

build:
  number: 0
  script:
    - mojo precompile -I . json -o ${{ PREFIX }}/lib/mojo/json.mojoc
    - mojo precompile -I . msgpack -o ${{ PREFIX }}/lib/mojo/msgpack.mojoc
    - mojo precompile -I . bson -o ${{ PREFIX }}/lib/mojo/bson.mojoc
    - mojo precompile -I . cbor -o ${{ PREFIX }}/lib/mojo/cbor.mojoc

requirements:
  build:
    - mojo-compiler ${{ mojo_version }}
  host:
    - mojo-compiler ${{ mojo_version }}
  run:
    - ${{ pin_compatible('mojo-compiler') }}

tests:
  - script:
      - if: unix
        then:
          - mojo run test_package.mojo
    files:
      recipe:
        - test_package.mojo
    requirements:
      run:
        - mojo ${{ mojo_version }}

about:
  homepage: https://github.com/Dark-Captcha/json-mojo
  repository: https://github.com/Dark-Captcha/json-mojo
  license: Apache-2.0 WITH LLVM-exception
  license_file: LICENSE
  summary: Spec-exact SIMD-accelerated JSON and binary formats for Mojo

extra:
  maintainers:
    - Dark-Captcha
